name: RWA Daily Digest

on:
  schedule:
    - cron: "0 23 * * *"    # 每天 UTC 23:00 = SGT 07:00（加上延迟约落在07:00-09:00）
  workflow_dispatch:

env:
  LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  daily-digest:
    name: 📰 Daily Digest (07:00 SGT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: |
            .seen_articles.json
            .feed_health.json
          key: botstate-${{ runner.os }}-${{ github.run_id }}
          restore-keys: botstate-${{ runner.os }}-

      - name: Run daily digest
        run: python scripts/rwa_news_fetcher.py --mode daily

      - name: Save bot state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .seen_articles.json
            .feed_health.json
          key: botstate-${{ runner.os }}-${{ github.run_id }}
